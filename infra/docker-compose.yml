services:
  db:
    image: postgres:16
    container_name: logistica_db
    environment:
      POSTGRES_USER: logistica
      POSTGRES_PASSWORD: logistica123
      POSTGRES_DB: logistica_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ../backend
    container_name: logistica_api
    environment:
      DATABASE_URL: postgresql+psycopg://logistica:logistica123@db:5432/logistica_db
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ../backend:/app
    env_file:
      - .env

volumes:
  pgdata:

